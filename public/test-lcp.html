<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teste LCP</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; }
      .hero { position: relative; height: 680px; overflow: hidden; }
      .hero img { display: block; width: 100%; height: 680px; object-fit: cover; }
      .card { position: absolute; inset: 0; display: flex; align-items: center; padding-left: 80px; }
      .box { max-width: 560px; background: white; padding: 48px; border-radius: 24px; }
      h1 { margin: 0; font-size: 52px; line-height: 1.05; color: #1e2a4a; }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <img src="/hero-novo-lcp.jpg" width="1536" height="1024" fetchpriority="high" loading="eager" alt="Teste" />
        <div class="card"><div class="box"><h1>Manutenção, Conserto e Aluguel de Paleteiras em Cascavel</h1></div></div>
      </section>
    </main>
  </body>
</html>
